services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: velocity
      POSTGRES_USER: velocity
      POSTGRES_PASSWORD: velocity_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velocity -d velocity"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://velocity:velocity_secret@postgres:5432/velocity
      JWT_SECRET: supersecret_jwt_key_change_in_production
      FLASK_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
